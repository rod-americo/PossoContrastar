<!doctype html>
<html lang="pt-BR" data-theme="lilas">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Preview Lilas</title>
    <link rel="stylesheet" href="./lilas.css">
    <style>
      body { margin: 0; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; }
      main { max-width: 760px; margin: 48px auto; padding: 24px; }
      .panel { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 20px; }
      h1 { color: var(--title); }
      button { background: var(--primary); color: #fff; border: 0; border-radius: 28px; padding: 10px 16px; }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <h1>Lilas</h1>
        <p>Kit cromatico claro para leitura, educacao e Q&A.</p>
        <button type="button">Acao principal</button>
      </section>
    </main>
  </body>
</html>
