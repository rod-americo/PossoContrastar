<!doctype html>
<html lang="pt-BR" data-theme="nocturno">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Preview Nocturno</title>
    <link rel="stylesheet" href="./nocturno.css">
    <style>
      body { margin: 0; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; }
      main { max-width: 760px; margin: 48px auto; padding: 24px; }
      .panel { background: var(--surface); border: 1px solid var(--line); border-radius: 8px; padding: 20px; }
      h1 { color: var(--title); }
      button { background: var(--primary-dark); color: var(--text); border: 1px solid var(--primary); border-radius: 6px; padding: 10px 14px; }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <h1>Nocturno</h1>
        <p>Kit cromatico escuro para operacao clinica densa.</p>
        <button type="button">Acao principal</button>
      </section>
    </main>
  </body>
</html>
